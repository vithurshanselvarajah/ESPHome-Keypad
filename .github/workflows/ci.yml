name: CI

on:
  push:
    branches-ignore: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    name: CI precheck
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.decide.outputs.run_ci }}
    steps:
      - id: decide
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('run_ci', 'true');
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const head = `${context.repo.owner}:${branch}`;
            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head,
              per_page: 100,
            });

            core.info(`Open PRs for ${head}: ${prs.length}`);
            core.setOutput('run_ci', prs.length === 0 ? 'true' : 'false');

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: precheck
    if: needs.precheck.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  lint:
    name: Lint automations
    runs-on: ubuntu-latest
    needs: test
    if: needs.precheck.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint automation YAML
        run: yamllint -c .yamllint.yml automations/

  validate:
    name: Validate ESPHome config
    runs-on: ubuntu-latest
    needs: lint
    if: needs.precheck.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Point keypad refs to current branch
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          branch = os.environ["BRANCH"]
          path = Path("keypad.yaml")
          text = path.read_text(encoding="utf-8")
          updated = text.replace("ref: main", f"ref: {branch}")
          path.write_text(updated, encoding="utf-8")
          print(f"keypad.yaml refs set to: {branch}")
          PY
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-esphome-

      - name: Install ESPHome
        run: pip install --upgrade esphome

      - name: Generate CI secrets
        run: python tests/generate_test_secrets.py

      - name: Validate config
        run: esphome config keypad.yaml

  compile:
    name: Compile firmware
    runs-on: ubuntu-latest
    needs: [precheck, validate]
    if: needs.precheck.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Point keypad refs to current branch
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          branch = os.environ["BRANCH"]
          path = Path("keypad.yaml")
          text = path.read_text(encoding="utf-8")
          updated = text.replace("ref: main", f"ref: {branch}")
          path.write_text(updated, encoding="utf-8")
          print(f"keypad.yaml refs set to: {branch}")
          PY
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-esphome-

      - name: Install ESPHome
        run: pip install --upgrade esphome

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('keypad.yaml', 'keypad/**/*.yaml', 'keypad/include/**') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Generate CI secrets
        run: python tests/generate_test_secrets.py

      - name: Compile firmware
        run: esphome compile keypad.yaml

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ github.sha }}
          path: .esphome/build/esphome-keypad/.pioenvs/esphome-keypad/firmware.bin
          retention-days: 30
