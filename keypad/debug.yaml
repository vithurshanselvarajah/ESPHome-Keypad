# ====================================================
#  Debug — Web UI, system diagnostics & test controls
#
#  Enable by adding to keypad.yaml packages:
#    debug: !include keypad/debug.yaml
#  and setting: debug_mode: "1"
#
#  Web UI:  http://<device-ip>/
#  Log:     http://<device-ip>/logs
# ====================================================

globals:
  # fp_backup_data_str is declared in network.yaml — not repeated here
  - id: dbg_fp_last_result_str
    type: std::string
    restore_value: no
    initial_value: '"idle"'
  - id: dbg_selected_slot
    type: int
    restore_value: no
    initial_value: "1"
  - id: debug_ready
    type: bool
    restore_value: no
    initial_value: "false"

esphome:
  on_boot:
    priority: -200   # After all components are set up
    then:
      - lambda: "id(debug_ready) = true;"

# ---- Web server -----------------------------------------
# Exposes every entity (including internal ones) in a web UI
# and a real-time log stream at /logs

web_server:
  port: 80
  version: 3
  include_internal: true

# ---- ESPHome debug component ----------------------------
# Populates free heap, loop time, reset reason, device info

debug:
  update_interval: 5s

# ---- System diagnostic sensors --------------------------

sensor:
  - platform: debug
    free:
      name: "Debug: Free Heap"
      id: dbg_free_heap
      icon: mdi:memory
    block:
      name: "Debug: Max Contiguous Heap"
      id: dbg_block_heap
      icon: mdi:memory
    loop_time:
      name: "Debug: Loop Time"
      id: dbg_loop_time
      icon: mdi:timer-outline

  - platform: wifi_signal
    name: "Debug: WiFi RSSI"
    id: dbg_wifi_rssi
    update_interval: 10s
    icon: mdi:wifi

  - platform: uptime
    name: "Debug: Uptime"
    id: dbg_uptime
    update_interval: 10s
    icon: mdi:clock-outline

  - platform: internal_temperature
    name: "Debug: CPU Temperature"
    id: dbg_cpu_temp
    update_interval: 10s
    icon: mdi:thermometer

# ---- System text sensors --------------------------------

text_sensor:
  - platform: debug
    device:
      name: "Debug: Device Info"
      id: dbg_device_info
    reset_reason:
      name: "Debug: Reset Reason"
      id: dbg_reset_reason

  - platform: wifi_info
    ip_address:
      name: "Debug: IP Address"
      id: dbg_ip
    ssid:
      name: "Debug: WiFi SSID"
      id: dbg_ssid
    bssid:
      name: "Debug: WiFi BSSID"
      id: dbg_bssid
    mac_address:
      name: "Debug: MAC Address"
      id: dbg_mac

# ---- Internal state visibility --------------------------
# These mirror the runtime globals so you can watch them live in the web UI

  - platform: template
    name: "Debug: HA Connected"
    id: dbg_ha_connected
    update_interval: 2s
    icon: mdi:home-assistant
    lambda: 'return std::string(api::global_api_server != nullptr && api::global_api_server->is_connected() ? "YES" : "NO");'

  - platform: template
    name: "Debug: Keypad Active"
    id: dbg_keypad_active
    update_interval: 2s
    icon: mdi:keyboard
    lambda: 'return std::string(id(keypad_active) ? "YES — entry in progress" : "NO");'

  - platform: template
    name: "Debug: Saved LED State"
    id: dbg_saved_led
    update_interval: 2s
    icon: mdi:led-on
    lambda: |-
      char buf[96];
      snprintf(buf, sizeof(buf), "on=%s  R=%.2f  G=%.2f  B=%.2f  Bri=%.2f",
               id(saved_on) ? "true" : "false",
               id(saved_r), id(saved_g), id(saved_b), id(saved_bri));
      return std::string(buf);

  - platform: template
    name: "Debug: FP Backup Buffer"
    id: dbg_fp_backup
    update_interval: 2s
    icon: mdi:database
    lambda: |-
      if (!id(fp_backup_data_str).empty()) {
        char buf[48];
        snprintf(buf, sizeof(buf), "READY — %u chars", (unsigned)id(fp_backup_data_str).size());
        return std::string(buf);
      }
      return std::string("idle — no data in buffer");

  - platform: template
    name: "Debug: FP Backup Data Preview"
    id: dbg_fp_backup_preview
    update_interval: 2s
    icon: mdi:text-box-outline
    lambda: |-
      if (id(fp_backup_data_str).empty())
        return std::string("(empty)");
      // Show first 80 + last 20 chars with ellipsis so you can verify it looks valid
      const auto &s = id(fp_backup_data_str);
      if (s.size() <= 100) return s;
      return s.substr(0, 80) + "..." + s.substr(s.size() - 20);

  - platform: template
    name: "Debug: FP Backup Last Result"
    id: dbg_fp_backup_result
    icon: mdi:check-circle-outline
    lambda: 'return id(dbg_fp_last_result_str);'
    update_interval: 2s

  - platform: template
    name: "Debug: FP Sensor Capacity"
    id: dbg_fp_cap
    update_interval: 5s
    icon: mdi:counter
    lambda: |-
      char buf[32];
      snprintf(buf, sizeof(buf), "%d enrolled / %d slots",
               (int)round(id(fp_count_sensor).state),
               (int)round(id(fp_capacity_sensor).state));
      return std::string(buf);

# ---- Switches -------------------------------------------

# ---- LED digit progress slider + FP slot selector ------
# LED: slide to 1-4 to simulate keypad digits; 0 restores
# FP:  set which slot backup/restore/enroll buttons operate on

number:
  - platform: template
    name: "Debug: LED Digit Simulator"
    id: dbg_digit_count
    icon: mdi:numeric
    min_value: 0
    max_value: 4
    step: 1
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: "return id(debug_ready);"
          then:
            - if:
                condition:
                  lambda: "return (int)x > 0;"
                then:
                  # Only snapshot state on first press (before keypad_active is set)
                  - if:
                      condition:
                        lambda: "return !id(keypad_active);"
                      then:
                        - lambda: |-
                            auto &v = id(status_light).current_values;
                            id(saved_r)   = v.get_red();
                            id(saved_g)   = v.get_green();
                            id(saved_b)   = v.get_blue();
                            id(saved_bri) = v.get_brightness();
                            id(saved_on)  = v.is_on();
                            id(keypad_active) = true;
                  - script.execute:
                      id: keypad_led_progress
                      count: !lambda "return (int)x;"
                else:
                  - script.execute: keypad_restore_state

  - platform: template
    name: "Debug: FP Selected Slot"
    id: dbg_fp_selected_slot
    icon: mdi:numeric-1-box-outline
    min_value: 1
    max_value: 200
    step: 1
    optimistic: true
    initial_value: 1
    on_value:
      - lambda: "id(dbg_selected_slot) = (int)x;"

# ---- Test buttons ---------------------------------------

button:

  # ==== STATUS LED ====

  - platform: template
    name: "Debug: LED → White 100%"
    icon: mdi:white-balance-sunny
    on_press:
      - light.turn_on:
          id: status_light
          brightness: 100%
          red: 100%
          green: 100%
          blue: 100%
          transition_length: 0ms

  - platform: template
    name: "Debug: LED → Red"
    icon: mdi:circle
    on_press:
      - light.turn_on:
          id: status_light
          brightness: 100%
          red: 100%
          green: 0%
          blue: 0%
          transition_length: 0ms

  - platform: template
    name: "Debug: LED → Green"
    icon: mdi:circle
    on_press:
      - light.turn_on:
          id: status_light
          brightness: 100%
          red: 0%
          green: 100%
          blue: 0%
          transition_length: 0ms

  - platform: template
    name: "Debug: LED → Blue"
    icon: mdi:circle
    on_press:
      - light.turn_on:
          id: status_light
          brightness: 100%
          red: 0%
          green: 0%
          blue: 100%
          transition_length: 0ms

  - platform: template
    name: "Debug: LED → Pink"
    icon: mdi:circle
    on_press:
      - light.turn_on:
          id: status_light
          brightness: 100%
          red: 100%
          green: 20%
          blue: 60%
          transition_length: 0ms

  - platform: template
    name: "Debug: LED → Off"
    icon: mdi:circle-off-outline
    on_press:
      - light.turn_off:
          id: status_light

  # ==== PIN ENTRY FLOW ====

  - platform: template
    name: "Debug: PIN → Trigger Submit Flash"
    icon: mdi:gesture-tap-button
    on_press:
      - script.execute: keypad_led_flash

  - platform: template
    name: "Debug: PIN → Restore LED State"
    icon: mdi:restore
    on_press:
      - script.execute: keypad_restore_state

  - platform: template
    name: "Debug: PIN → Fire HA Event (code=1234)"
    icon: mdi:send
    on_press:
      - homeassistant.event:
          event: esphome.keypad_code_entered
          data:
            code: "1234"

  # ==== FINGERPRINT AURA LED ====
  # Each button mirrors an exact real trigger so you can verify the sensor ring

  - platform: template
    name: "Debug: FP Aura → Green Breathe [match]"
    icon: mdi:fingerprint
    on_press:
      - fingerprint_grow.aura_led_control:
          state: BREATHING
          speed: 200
          color: GREEN
          count: 2

  - platform: template
    name: "Debug: FP Aura → Red Flash x4 [unmatched]"
    icon: mdi:fingerprint-off
    on_press:
      - fingerprint_grow.aura_led_control:
          state: FLASHING
          speed: 30
          color: RED
          count: 4

  - platform: template
    name: "Debug: FP Aura → Red Flash x2 [invalid scan]"
    icon: mdi:fingerprint-off
    on_press:
      - fingerprint_grow.aura_led_control:
          state: FLASHING
          speed: 25
          color: RED
          count: 2

  - platform: template
    name: "Debug: FP Aura → Purple Flash [misplaced]"
    icon: mdi:fingerprint
    on_press:
      - fingerprint_grow.aura_led_control:
          state: FLASHING
          speed: 25
          color: PURPLE
          count: 2

  - platform: template
    name: "Debug: FP Aura → Blue Flash [enrollment scan]"
    icon: mdi:fingerprint
    on_press:
      - fingerprint_grow.aura_led_control:
          state: FLASHING
          speed: 25
          color: BLUE
          count: 2

  - platform: template
    name: "Debug: FP Aura → Purple On [awaiting scan]"
    icon: mdi:fingerprint
    on_press:
      - fingerprint_grow.aura_led_control:
          state: ALWAYS_ON
          speed: 0
          color: PURPLE
          count: 0

  - platform: template
    name: "Debug: FP Aura → Blue Breathe [enrolled OK]"
    icon: mdi:fingerprint
    on_press:
      - fingerprint_grow.aura_led_control:
          state: BREATHING
          speed: 100
          color: BLUE
          count: 2

  - platform: template
    name: "Debug: FP Aura → Red Flash x4 [enroll failed]"
    icon: mdi:fingerprint-off
    on_press:
      - fingerprint_grow.aura_led_control:
          state: FLASHING
          speed: 25
          color: RED
          count: 4

  - platform: template
    name: "Debug: FP Aura → Off"
    icon: mdi:fingerprint
    on_press:
      - fingerprint_grow.aura_led_control:
          state: ALWAYS_OFF
          speed: 0
          color: RED
          count: 0

  # ==== FINGERPRINT MANAGEMENT ====
  # Uses "Debug: FP Selected Slot" slider for slot number

  - platform: template
    name: "Debug: FP → Enroll Selected Slot (2 scans)"
    icon: mdi:account-plus
    on_press:
      - lambda: |-
          int slot = id(dbg_selected_slot);
          ESP_LOGI("fp_debug", "[DEBUG] Enrolling into slot %d", slot);
          id(fingerprint_sensor).enroll_fingerprint(slot, 2);

  - platform: template
    name: "Debug: FP → Cancel Enroll"
    icon: mdi:cancel
    on_press:
      - fingerprint_grow.cancel_enroll:

  - platform: template
    name: "Debug: FP → Delete Selected Slot"
    icon: mdi:delete
    on_press:
      - lambda: |-
          int slot = id(dbg_selected_slot);
          ESP_LOGI("fp_debug", "[DEBUG] Deleting slot %d", slot);
      - fingerprint_grow.delete:
          finger_id: !lambda "return id(dbg_selected_slot);"

  - platform: template
    name: "Debug: FP → Fire HA Auth Event (selected slot, conf=100)"
    icon: mdi:send
    on_press:
      - homeassistant.event:
          event: esphome.fingerprint_authenticated
          data:
            id: !lambda "return to_string(id(dbg_selected_slot));"
            confidence: "100"

  # ==== FINGERPRINT BACKUP / RESTORE ====
  # Set "Debug: FP Selected Slot" slider first, then use buttons below.
  # Results appear in "Debug: FP Backup Last Result" and the log.

  - platform: template
    name: "Debug: FP → Backup Selected Slot"
    icon: mdi:database-export
    on_press:
      - lambda: |-
          int slot = id(dbg_selected_slot);
          std::string result = fp_backup::backup_slot(id(uart_fingerprint), slot);
          if (result.empty()) {
            id(dbg_fp_last_result_str) = "FAIL: slot " + to_string(slot) + " (asleep or empty)";
            ESP_LOGW("fp_backup", "[DEBUG] Backup slot %d failed", slot);
            return;
          }
          id(fp_backup_data_str) = result;
          id(dbg_fp_last_result_str) = "OK: slot " + to_string(slot) + " (" + to_string(result.size()) + " chars)";
          ESP_LOGI("fp_backup", "[DEBUG] Slot %d backed up: %u chars", slot, (unsigned)result.size());

  - platform: template
    name: "Debug: FP → Restore Buffer → Selected Slot"
    icon: mdi:database-import
    on_press:
      - lambda: |-
          int slot = id(dbg_selected_slot);
          if (id(fp_backup_data_str).empty()) {
            id(dbg_fp_last_result_str) = "FAIL: buffer is empty — backup a slot first";
            ESP_LOGW("fp_backup", "[DEBUG] Restore: no data in buffer");
            return;
          }
          bool ok = fp_backup::restore_slot(id(uart_fingerprint), slot, id(fp_backup_data_str));
          id(dbg_fp_last_result_str) = std::string(ok ? "OK" : "FAIL") + ": restore → slot " + to_string(slot);
          ESP_LOGI("fp_backup", "[DEBUG] Restore → slot %d: %s", slot, ok ? "OK" : "FAILED");
          if (ok) id(fingerprint_sensor).update();

  - platform: template
    name: "Debug: FP → Backup All Enrolled Slots"
    icon: mdi:database-export
    on_press:
      - lambda: |-
          int count    = (int)round(id(fp_count_sensor).state);
          int capacity = (int)round(id(fp_capacity_sensor).state);
          if (count == 0) {
            id(dbg_fp_last_result_str) = "FAIL: no fingerprints enrolled";
            ESP_LOGW("fp_backup", "[DEBUG] Backup all: no enrolled fingerprints");
            return;
          }
          int ok_count = 0, fail_count = 0;
          for (int s = 1; s <= capacity; s++) {
            std::string result = fp_backup::backup_slot(id(uart_fingerprint), s);
            if (result.empty()) {
              // Empty result = slot not enrolled or timeout; skip silently
              continue;
            }
            ok_count++;
            ESP_LOGI("fp_backup", "[DEBUG] Backup all: slot %d OK (%u chars)", s, (unsigned)result.size());
            // Keep last successful result in buffer so it can be restored
            id(fp_backup_data_str) = result;
          }
          if (ok_count == 0) fail_count = count;
          id(dbg_fp_last_result_str) = "Backup all: " + to_string(ok_count) + " OK / " + to_string(capacity) + " slots checked (see logs)";
          ESP_LOGI("fp_backup", "[DEBUG] Backup all complete: %d OK", ok_count);

  - platform: template
    name: "Debug: FP → Clear Backup Buffer"
    icon: mdi:database-remove
    on_press:
      - lambda: |-
          id(fp_backup_data_str).clear();
          id(dbg_fp_last_result_str) = "buffer cleared";
          ESP_LOGI("fp_backup", "[DEBUG] Backup buffer cleared");

  # ==== SYSTEM ====

  - platform: template
    name: "Debug: System → Reboot"
    icon: mdi:restart
    on_press:
      - lambda: "esp_restart();"
