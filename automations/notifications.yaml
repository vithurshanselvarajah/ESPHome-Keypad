# Notification — Keypad Activity
#
# HOW TO USE:
#   Settings → Automations → New Automation → 3-dot menu → Edit in YAML
#   Paste this block. Replace the values marked REPLACE.
#
# Sends a push notification whenever a PIN is entered or a fingerprint
# is authenticated on the keypad. The alarm state change itself is
# handled by pin-access.yaml / fingerprint-access.yaml.
#
# REPLACE:
#   - REPLACE_KEYPAD_DEVICE_ID  → your device_id from event data
#   - notify.mobile_app_your_phone  → your actual notify target
#
# Tip: to notify on BOTH PIN and fingerprint events you can add a
# second trigger block with event_type: esphome.fingerprint_authenticated.

alias: "Notify: Keypad activity"
description: Push notification on PIN entry or fingerprint authentication.
triggers:
  - trigger: event
    event_type: esphome.keypad_code_entered
    event_data:
      device_id: REPLACE_KEYPAD_DEVICE_ID
  - trigger: event
    event_type: esphome.fingerprint_authenticated
    event_data:
      device_id: REPLACE_KEYPAD_DEVICE_ID
conditions: []
actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.event_type == 'esphome.keypad_code_entered' }}"
        sequence:
          - action: notify.mobile_app_your_phone
            data:
              title: "Keypad"
              message: "PIN submitted"
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.event_type == 'esphome.fingerprint_authenticated' }}"
        sequence:
          - action: notify.mobile_app_your_phone
            data:
              title: "Keypad"
              message: >
                Fingerprint authenticated (slot {{ trigger.event.data.id }},
                confidence {{ trigger.event.data.confidence }})
mode: queued
max: 5
#     name: "Keypad Wrong PIN Count"
#     initial: 0
#     step: 1
#     restore: false
