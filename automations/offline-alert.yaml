# Offline Alert
#
# HOW TO USE:
#   Settings → Automations → New Automation → 3-dot menu → Edit in YAML
#   Paste this block. Replace the values marked REPLACE.
#
# Sends a push notification if the keypad goes offline for more than
# 1 minute. HA creates a binary_sensor.DEVICE_connected entity
# automatically when you add an ESPHome device.
#
# REPLACE:
#   - binary_sensor.REPLACE_DEVICE_connected
#     → e.g. binary_sensor.esphome_keypad_58066c_connected
#   - notify.mobile_app_your_phone  → your actual notify target

alias: "Alarm: Keypad offline alert"
description: Notifies when the keypad loses connection to Home Assistant.
triggers:
  - trigger: state
    entity_id: binary_sensor.REPLACE_DEVICE_connected
    to: "off"
    for:
      minutes: 1
conditions: []
actions:
  - action: notify.mobile_app_your_phone
    data:
      title: "⚠ Keypad Offline"
      message: >
        The keypad has lost connection to Home Assistant.
        Check power and Wi-Fi. The alarm cannot be disarmed remotely.
mode: single
