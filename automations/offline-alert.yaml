# Offline Alert Automations
#
# Alerts when a keypad loses connectivity with Home Assistant.
# Uses the ESPHome API connection status (binary_sensor created automatically
# by HA when you add the ESPHome device).
#
# Entity IDs follow the pattern:
#   binary_sensor.<device_name>_connected
# where device_name matches the `device_name` substitution in keypad.yaml
# (with hyphens replaced by underscores).
#
# MULTI-KEYPAD:
#   Add every keypad's connected sensor to the trigger entity list.

automation:
  # ----------------------------------------------------------------
  # Alert when any keypad goes offline
  # ----------------------------------------------------------------
  - alias: "Keypad: Offline alert"
    id: keypad_offline_alert
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.esphome_front_door_connected
          - binary_sensor.esphome_garage_connected
          # Add more keypads here
        to: "off"
        for: "00:01:00"   # only alert if offline for more than 1 minute
    variables:
      keypad: >
        {{ trigger.to_state.attributes.friendly_name
           | default(trigger.entity_id | replace('binary_sensor.', '')
                     | replace('_connected', '') | replace('_', ' ') | title) }}
    action:
      - service: notify.mobile_app_phone
        data:
          title: "⚠ Keypad Offline"
          message: "{{ keypad }} has lost connection to Home Assistant."

  # ----------------------------------------------------------------
  # Notify when a keypad comes back online
  # ----------------------------------------------------------------
  - alias: "Keypad: Back online"
    id: keypad_back_online
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.esphome_front_door_connected
          - binary_sensor.esphome_garage_connected
        to: "on"
        from: "off"
    variables:
      keypad: >
        {{ trigger.to_state.attributes.friendly_name
           | default(trigger.entity_id | replace('binary_sensor.', '')
                     | replace('_connected', '') | replace('_', ' ') | title) }}
    action:
      - service: notify.mobile_app_phone
        data:
          title: "✓ Keypad Online"
          message: "{{ keypad }} has reconnected to Home Assistant."
      # Restore LED colour after reconnect
      - service: "esphome.{{ trigger.entity_id | replace('binary_sensor.', '')
                              | replace('_connected', '') }}_set_led_colour"
        data:
          hex: "FFFFFF"
          brightness: >
            {{ states('number.' ~ trigger.entity_id
               | replace('binary_sensor.', '')
               | replace('_connected', '')
               ~ '_led_brightness') | int(100) }}
