# Fingerprint — Alarm Toggle
#
# HOW TO USE:
#   Settings → Automations → New Automation → 3-dot menu → Edit in YAML
#   Paste this block. Replace the values marked REPLACE.
#
# Placing an enrolled finger toggles the alarm state, same as the PIN:
#   Green LED (#33FF00) = currently armed → fingerprint disarms
#   Any other colour   = currently disarmed → fingerprint arms
# Low-confidence matches (< 50) are silently ignored.
#
# REPLACE:
#   - REPLACE_KEYPAD_DEVICE_ID  → your device_id from event data
#     (listen to esphome.fingerprint_authenticated in Developer Tools)
#   - REPLACE_ACTION_PREFIX     → e.g. esphome_keypad_58066c
#   - REPLACE_COLOUR_SENSOR     → e.g. sensor.keypad_58066c_led_colour_hex

alias: "Alarm: Toggle armed/disarmed via fingerprint"
description: >-
  Enrolled fingerprint toggles alarm state. Green = armed, red = disarmed.
triggers:
  - trigger: event
    event_type: esphome.fingerprint_authenticated
    event_data:
      device_id: REPLACE_KEYPAD_DEVICE_ID
conditions:
  - condition: template
    value_template: "{{ trigger.event.data.confidence | int >= 50 }}"
actions:
  - if:
      - condition: state
        entity_id: REPLACE_COLOUR_SENSOR
        state: "#33FF00"
    then:
      - delay:
          seconds: 2
      - alias: "Disarm — set LED red"
        action: esphome.REPLACE_ACTION_PREFIX_set_led_colour
        data:
          hex: "#FF0000"
          brightness: 50
      - alias: "Disarm the alarm"
        action: alarm_control_panel.alarm_disarm
        target:
          entity_id: alarm_control_panel.home_alarm
    else:
      - delay:
          seconds: 2
      - alias: "Arm — set LED green"
        action: esphome.REPLACE_ACTION_PREFIX_set_led_colour
        data:
          hex: "#33FF00"
          brightness: 50
      - alias: "Arm the alarm"
        action: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.home_alarm
mode: single
