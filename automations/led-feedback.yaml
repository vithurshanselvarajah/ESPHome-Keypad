# LED Feedback — Wrong PIN
#
# HOW TO USE:
#   Settings → Automations → New Automation → 3-dot menu → Edit in YAML
#   Paste this block. Replace the values marked REPLACE.
#
# When an incorrect PIN is entered the LED flashes red for 3 seconds
# then restores to the current alarm-state colour (green = armed,
# red = disarmed). The 2-second delay lets the keypad breathing
# effect complete first.
#
# For correct PIN feedback the alarm toggle automation (pin-access.yaml)
# sets the new colour directly — no separate automation needed.
#
# REPLACE:
#   - REPLACE_KEYPAD_DEVICE_ID  → your device_id from event data
#     (listen to esphome.keypad_code_entered in Developer Tools to find it)
#   - REPLACE_ACTION_PREFIX     → e.g. esphome_keypad_58066c
#   - REPLACE_COLOUR_SENSOR     → e.g. sensor.keypad_58066c_led_colour_hex

alias: "Alarm: Wrong PIN — flash red"
description: Flashes the LED red briefly when an unrecognised PIN is entered.
triggers:
  - trigger: event
    event_type: esphome.keypad_code_entered
    event_data:
      device_id: REPLACE_KEYPAD_DEVICE_ID
conditions:
  # Only fire for codes that do NOT match any known PIN.
  # Add more != conditions here if you have multiple PINs.
  - condition: template
    value_template: "{{ trigger.event.data.code != '1234' }}"
actions:
  - delay:
      seconds: 2
  - alias: "Flash red — wrong PIN"
    action: esphome.REPLACE_ACTION_PREFIX_set_led_colour
    data:
      hex: "#FF0000"
      brightness: 100
  - delay:
      seconds: 3
  - alias: "Restore idle colour"
    action: esphome.REPLACE_ACTION_PREFIX_set_led_colour
    data:
      hex: "{{ states('REPLACE_COLOUR_SENSOR') }}"
      brightness: 50
mode: single
