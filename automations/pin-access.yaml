# PIN — Alarm Toggle
#
# HOW TO USE:
#   Settings → Automations → New Automation → 3-dot menu → Edit in YAML
#   Paste this block. Replace the two values marked REPLACE.
#
# CONCEPT:
#   The LED colour acts as the alarm state indicator:
#     Green  (#33FF00) = Armed
#     Red    (#FF0000) = Disarmed
#   Entering the correct PIN toggles between the two states.
#   The keypad breathes in the current colour after each PIN entry,
#   then HA sends the new colour to confirm the state change.
#
# ENTITY IDs TO REPLACE:
#   - REPLACE_KEYPAD_DEVICE_ID  → your device_id from the event data
#   - REPLACE_ACTION_PREFIX     → e.g. esphome_keypad_58066c
#   - REPLACE_COLOUR_SENSOR     → e.g. sensor.keypad_58066c_led_colour_hex
#
# Find entity IDs: Settings → Developer Tools → Events
# Listen to esphome.keypad_code_entered and press # on the keypad.
# The device_id appears in the event data.

alias: "Alarm: Toggle armed/disarmed via PIN"
description: >
  Correct PIN toggles alarm state. Green LED = armed, red LED = disarmed.
  Replace the PIN in event_data with your own code.
triggers:
  - trigger: event
    event_type: esphome.keypad_code_entered
    event_data:
      device_id: REPLACE_KEYPAD_DEVICE_ID
      code: "1234"
conditions: []
actions:
  - if:
      - condition: state
        entity_id: REPLACE_COLOUR_SENSOR
        state: "#33FF00"
    then:
      - delay:
          seconds: 2
      - alias: "Disarm — set LED red"
        action: esphome.REPLACE_ACTION_PREFIX_set_led_colour
        data:
          hex: "#FF0000"
          brightness: 50
      - alias: "Disarm the alarm"
        action: alarm_control_panel.alarm_disarm
        target:
          entity_id: alarm_control_panel.home_alarm
    else:
      - delay:
          seconds: 2
      - alias: "Arm — set LED green"
        action: esphome.REPLACE_ACTION_PREFIX_set_led_colour
        data:
          hex: "#33FF00"
          brightness: 50
      - alias: "Arm the alarm"
        action: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.home_alarm
mode: single
