# Fingerprint — Enroll next slot
#
# HOW TO USE:
#   Settings → Automations → New Automation → 3-dot menu → Edit in YAML
#   Paste this block. Replace the values marked REPLACE.
#
# ENROLLMENT FLOW:
#   1. Fire the trigger event from Developer Tools → Events:
#        event_type: keypad.enroll_fingerprint
#   2. The automation calls fingerprint_enroll on the device.
#   3. LED turns purple — place your finger on the sensor.
#   4. Lift after each blue flash, repeat for each scan.
#   5. Blue breathing = enrolled successfully.
#
# You can also call the action directly from Developer Tools → Actions:
#   action: esphome.REPLACE_ACTION_PREFIX_fingerprint_enroll
#   data:
#     slot: 1
#     num_scans: 3
#
# REPLACE:
#   - REPLACE_ACTION_PREFIX  → e.g. esphome_keypad_58066c
#   - REPLACE_FP_COUNT_SENSOR → e.g. sensor.keypad_58066c_fingerprint_count
#   - notify.mobile_app_your_phone  → your actual notify target

alias: "Fingerprint: Enroll next available slot"
description: >-
  Fire keypad.enroll_fingerprint to enroll into the next free slot.
triggers:
  - trigger: event
    event_type: keypad.enroll_fingerprint
conditions:
  - condition: template
    value_template: "{{ states('REPLACE_FP_COUNT_SENSOR') | int < 200 }}"
actions:
  - variables:
      next_slot: "{{ states('REPLACE_FP_COUNT_SENSOR') | int + 1 }}"
  - alias: "Start enrollment on device"
    action: esphome.REPLACE_ACTION_PREFIX_fingerprint_enroll
    data:
      slot: "{{ next_slot | int }}"
      num_scans: 3
  - action: notify.mobile_app_your_phone
    data:
      title: "Fingerprint Enrollment"
      message: >
        Enrolling slot {{ next_slot }}.
        Place your finger on the sensor when the LED turns purple.
mode: single
