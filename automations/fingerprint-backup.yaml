# Fingerprint — Capture backup data
#
# HOW TO USE:
#   Settings → Automations → New Automation → 3-dot menu → Edit in YAML
#   Paste this block. No values to replace — it captures backups from
#   any keypad automatically.
#
# BACKUP FLOW:
#   1. Call fingerprint_backup_slot from Developer Tools → Actions:
#        action: esphome.DEVICE_fingerprint_backup_slot
#        data: { slot: 1 }
#   2. This automation catches the resulting event and stores the
#      template in input_text.fp_backup_slot_N (create in Helpers UI).
#
# RESTORE FLOW (to a single device):
#   Developer Tools → Actions:
#     action: esphome.DEVICE_fingerprint_restore_slot
#     data:
#       slot: 1
#       data: "{{ states('input_text.fp_backup_slot_1') }}"
#
# PREREQUISITE:
#   Create input_text helpers in Settings → Devices & Services → Helpers:
#     Name: "FP Backup Slot 1"  → Entity ID: input_text.fp_backup_slot_1
#   Repeat for each slot (max length 1024).

alias: "Fingerprint: Capture backup data"
description: Stores fingerprint template data from backup events into input_text helpers.
triggers:
  - trigger: event
    event_type: esphome.fingerprint_backup_data
conditions: []
actions:
  - action: input_text.set_value
    target:
      entity_id: "input_text.fp_backup_slot_{{ trigger.event.data.slot }}"
    data:
      value: "{{ trigger.event.data.data }}"
mode: queued
max: 10
