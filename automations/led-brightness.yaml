# LED — Night Mode (dim at scheduled time)
#
# HOW TO USE:
#   Settings → Automations → New Automation → 3-dot menu → Edit in YAML
#   Paste this block. Replace the values marked REPLACE.
#
# Dims the keypad LED at a set time each night.
# The firmware auto-boosts to 100% whenever a key is pressed,
# then returns to this idle level after 30 seconds.
#
# For day-mode (restore brightness) see led-brightness-day.yaml.
#
# REPLACE:
#   - number.REPLACE_DEVICE_led_brightness
#     → e.g. number.esphome_keypad_58066c_led_brightness

alias: "Keypad LED: Night mode — dim"
description: Dims the keypad LED at night.
triggers:
  - trigger: time
    at: "22:00:00"
conditions: []
actions:
  - action: number.set_value
    target:
      entity_id: number.REPLACE_DEVICE_led_brightness
    data:
      value: 20
mode: single
